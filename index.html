<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory/</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --text: #e8e8e8;
    --text2: #888;
    --accent: #4f9eff;
    --green: #34c759;
    --red: #ff453a;
    --orange: #ff9f0a;
    --yellow: #ffd60a;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    --tile-min: 260px;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f5f5f7; --surface: #fff; --surface2: #f0f0f0; --border: #ddd; --text: #1d1d1f; --text2: #86868b; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  body.aspect-square { --tile-min: 260px; }
  body.aspect-wide { --tile-min: 320px; }

  .topbar {
    position: sticky; top: 0; z-index: 100; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 12px 24px;
    display: flex; align-items: center; gap: 16px; backdrop-filter: blur(20px);
  }
  .topbar h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .breadcrumb { display: flex; align-items: center; gap: 4px; min-width: 0; }
  .breadcrumb a { color: var(--accent); text-decoration: none; font-size: 18px; font-weight: 600; cursor: pointer; }
  .breadcrumb a:hover { text-decoration: underline; }
  .breadcrumb .sep { color: var(--text2); font-size: 14px; margin: 0 2px; }
  .breadcrumb .current-wrap { display: inline-flex; align-items: center; gap: 6px; }
  .breadcrumb .current { color: var(--text); font-size: 18px; font-weight: 600; }

  .search { flex: 1 1 240px; max-width: 400px; min-width: 0; height: 32px; padding: 0 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
  .search:focus { border-color: var(--accent); }
  .filters { display: flex; gap: 6px; align-items: center; min-width: 0; }
  .filter-chip { height: 32px; padding: 0 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; }
  .filter-chip.active { background: var(--surface2); color: var(--text); border-color: var(--text2); }
  .filter-chip:hover:not(.active) { border-color: var(--text2); }
  .topbar-right { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }
  .sort-btn { height: 32px; background: none; border: 1px solid var(--border); color: var(--text2); padding: 0 10px; border-radius: 8px; cursor: pointer; font-size: 11px; white-space: nowrap; display: inline-flex; align-items: center; justify-content: center; }
  .sort-btn:hover { border-color: var(--text); color: var(--text); }
  .aspect-icon {
    display: inline-block;
    border: 1.5px solid currentColor;
    border-radius: 3px;
    opacity: 0.9;
    flex-shrink: 0;
  }
  .aspect-icon.square {
    width: 13px;
    height: 13px;
  }
  .aspect-icon.wide {
    width: 17px;
    height: 10px;
  }
  .stop-all-btn { height: 32px; background: none; border: 1px solid var(--border); color: var(--red); padding: 0 10px; border-radius: 8px; cursor: pointer; font-size: 11px; opacity: 0.7; display: inline-flex; align-items: center; justify-content: center; }
  .stop-all-btn:hover { border-color: var(--red); opacity: 1; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--tile-min), 1fr)); gap: 16px; padding: 24px; }
  .section-label { grid-column: 1 / -1; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text2); padding: 8px 0 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: transform 0.15s, box-shadow 0.15s; position: relative; aspect-ratio: 1 / 1; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .card.draggable { cursor: grab; }
  .card.dragging { opacity: 0.58; transform: scale(0.98); box-shadow: none; }
  .card.drop-active { border-color: var(--accent); box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 55%, transparent); }
  .card.draggable, .card[data-drop-type] { touch-action: none; }
  body.dragging-project, body.dragging-project * { user-select: none; cursor: grabbing !important; }
  .card-thumb { width: 100%; height: 100%; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; cursor: pointer; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
  .card-thumb img, .mini-grid img { -webkit-user-drag: none; user-select: none; pointer-events: none; }
  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    pointer-events: none;
  }
  .card:hover .card-thumb img { transform: scale(1.02); }
  .card-thumb img { transition: transform 0.22s ease; }
  .card-thumb .placeholder { font-size: 48px; opacity: 0.3; }
  .card-status {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--text2);
    box-shadow: 0 0 6px rgba(0,0,0,0.5);
    transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .card-status::before {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.28);
    backdrop-filter: blur(10px);
    z-index: -1;
  }
  .card-status.running { background: var(--green); box-shadow: 0 0 8px var(--green); cursor: pointer; }
  .card-status.running:hover { background: var(--red); box-shadow: 0 0 8px var(--red); transform: scale(1.4); }
  .card-status.starting { background: var(--orange); }
  .card-status.error { background: var(--red); }
  .card-info {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 18px 10px 10px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.1) 32%, rgba(0,0,0,0.82) 100%);
    color: #fff;
  }
  .card-info:hover { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.12) 28%, rgba(0,0,0,0.88) 100%); }
  .card-main { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; min-width: 0; }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(10px);
  }
  .card-main .card-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-subtitle {
    font-size: 10px;
    color: rgba(255,255,255,0.74);
    letter-spacing: 0.02em;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.18);
    backdrop-filter: blur(10px);
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(10px);
  }
  .card-commit { font-size: 10px; color: rgba(255,255,255,0.76); opacity: 0.95; font-family: var(--mono); white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .card-plus { font-size: 16px; color: rgba(255,255,255,0.62); opacity: 0.9; transition: opacity 0.15s; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
  .card-info:hover .card-plus { opacity: 1; color: #fff; }
  body.aspect-wide .card { aspect-ratio: auto; }
  body.aspect-wide .card-thumb { height: 200px; }
  body.aspect-wide .card-thumb::after { box-shadow: none; }
  body.aspect-wide .card-info {
    position: static;
    padding: 7px 12px;
    color: var(--text);
    background: transparent;
    align-items: center;
  }
  body.aspect-wide .card-info:hover { background: var(--surface2); }
  body.aspect-wide .card-main { gap: 2px; }
  body.aspect-wide .card-name {
    font-size: 14px;
    padding: 0;
    border-radius: 0;
    background: none;
    backdrop-filter: none;
    text-shadow: none;
    color: var(--text);
  }
  body.aspect-wide .card-subtitle {
    font-size: 11px;
    color: var(--text2);
    padding: 0;
    border-radius: 0;
    background: none;
    backdrop-filter: none;
  }
  body.aspect-wide .card-meta {
    gap: 8px;
    margin-left: auto;
    padding: 0;
    border-radius: 0;
    background: none;
    backdrop-filter: none;
  }
  body.aspect-wide .card-commit {
    color: var(--text2);
    text-shadow: none;
  }
  body.aspect-wide .card-plus {
    color: var(--text2);
    text-shadow: none;
  }
  body.aspect-wide .card-info:hover .card-plus { color: var(--text); }
  body.aspect-wide .card-status::before { display: none; }
  body.aspect-wide .group-dissolve-btn {
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(0,0,0,0.22);
  }
  body.aspect-wide .group-dissolve-btn:hover {
    background: rgba(0,0,0,0.4);
  }
  .rename-btn {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-size: 10px;
    line-height: 1;
    border-radius: 6px;
    padding: 4px 6px;
    cursor: pointer;
    white-space: nowrap;
  }
  .rename-btn:hover { border-color: var(--text2); color: var(--text); }
  .dissolve-btn { color: var(--red); }
  .dissolve-btn:hover { border-color: var(--red); color: var(--red); }
  .group-dissolve-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 3;
    width: 24px;
    height: 24px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(10px);
    color: var(--text2);
    opacity: 0.68;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    line-height: 1;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  }
  .group-dissolve-btn:hover {
    opacity: 1;
    color: var(--red);
    border-color: rgba(255,69,58,0.38);
    background: rgba(255,255,255,0.34);
  }
  .group-name-trigger {
    cursor: text;
    transition: color 0.15s;
  }
  .group-name-trigger:hover { color: var(--text); }
  .inline-edit { display: inline-flex; align-items: center; gap: 6px; min-width: 0; }
  .inline-edit-input {
    min-width: 0;
    width: 170px;
    height: 28px;
    padding: 0 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .inline-edit-input:focus { border-color: var(--text2); }
  .breadcrumb .inline-edit-input {
    height: 32px;
    width: 220px;
    font-size: 16px;
    font-weight: 600;
  }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge.node { background: #2d5016; color: #6cc644; }
  .badge.html { background: #4a2800; color: #e34c26; }
  .badge.python { background: #1a3a5c; color: #3776ab; }
  .badge.swift { background: #4a1a00; color: #fa7343; }
  .badge.collection { background: #2a2a00; color: #c9b458; }
  .badge.unknown, .badge.electron { background: #2a2a2a; color: #888; }
  .port-label { font-family: var(--mono); font-size: 11px; color: var(--accent); }

  /* Collection mini-grid */
  .card-thumb .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 100%; height: 100%; padding: 2px; }
  .mini-grid img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
  .mini-grid .mini-placeholder { background: var(--border); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text2); }
  .child-count { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

  /* Detail */
  .detail { display: none; padding: 24px; max-width: 1200px; margin: 0 auto; }
  .detail-header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 24px; }
  .detail-screenshot { flex: 1; min-height: 300px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .detail-screenshot img { width: 100%; height: auto; }
  .detail-screenshot .no-screenshot { color: var(--text2); text-align: center; padding: 40px; }
  .detail-controls { width: 300px; flex-shrink: 0; }
  .detail-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .detail-path { font-family: var(--mono); font-size: 11px; color: var(--text2); margin-bottom: 16px; word-break: break-all; }
  .detail-actions { display: flex; gap: 8px; margin-bottom: 16px; }
  .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-start { background: var(--green); color: #fff; }
  .btn-start:hover { filter: brightness(1.1); }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-stop:hover { filter: brightness(1.1); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .detail-status { padding: 12px; background: var(--surface2); border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  .detail-status .label { color: var(--text2); font-size: 11px; text-transform: uppercase; }
  .detail-status .value { font-weight: 600; margin-top: 2px; }
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .console-panel { margin-top: 16px; }
  .console-toggle { background: none; border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; width: 100%; text-align: left; }
  .console-toggle:hover { color: var(--text); }
  .console-output { display: none; margin-top: 8px; background: #000; border-radius: 8px; padding: 12px; max-height: 250px; overflow-y: auto; font-family: var(--mono); font-size: 11px; line-height: 1.5; }
  .console-output .stdout { color: #aaa; }
  .console-output .stderr { color: var(--orange); }
  .console-output .system { color: var(--accent); }

  .image-picker-section { margin-top: 24px; }
  .image-picker-toggle { background: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 8px; color: var(--text2); cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .image-picker-toggle:hover { border-color: var(--accent); color: var(--text); }
  .image-picker { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 12px; max-height: 400px; overflow-y: auto; padding: 4px; }
  .candidate-img { border: 2px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.15s; }
  .candidate-img:hover { border-color: var(--accent); transform: scale(1.02); }
  .candidate-img img { width: 100%; height: 100px; object-fit: cover; display: block; }
  .candidate-name { padding: 4px 8px; font-size: 10px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .timeline-section { margin-top: 32px; }
  .timeline-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .timeline-title .count { background: var(--surface2); padding: 2px 8px; border-radius: 10px; font-size: 12px; color: var(--text2); }
  .timeline-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 12px; scroll-snap-type: x proximity; }
  .timeline-scroll::-webkit-scrollbar { height: 6px; }
  .timeline-scroll::-webkit-scrollbar-track { background: var(--surface2); border-radius: 3px; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .timeline-item { flex-shrink: 0; width: 200px; scroll-snap-align: start; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .timeline-item:hover { border-color: var(--accent); }
  .timeline-item.current { border-color: var(--green); border-width: 2px; }
  .timeline-item.tag { border-color: var(--yellow); }
  .timeline-thumb { width: 100%; aspect-ratio: 1 / 1; background: var(--surface2); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .timeline-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .timeline-thumb .no-capture { font-size: 11px; color: var(--text2); text-align: center; padding: 8px; }
  .timeline-info { padding: 10px 12px; }
  .timeline-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .timeline-date { font-size: 11px; color: var(--text2); }
  .timeline-msg { font-size: 11px; color: var(--text2); margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: center; justify-content: center; cursor: pointer; }
  .modal-overlay.active { display: flex; }
  .modal-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .drop-overlay {
    position: fixed;
    inset: 0;
    z-index: 180;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: color-mix(in srgb, var(--bg) 72%, transparent);
    backdrop-filter: blur(6px);
  }
  .drop-overlay.active { display: flex; }
  .drop-overlay-card {
    min-width: 280px;
    padding: 18px 22px;
    border-radius: 16px;
    border: 1px solid color-mix(in srgb, var(--accent) 42%, var(--border));
    background: color-mix(in srgb, var(--surface) 92%, transparent);
    box-shadow: 0 18px 60px rgba(0,0,0,0.28);
    text-align: center;
  }
  .drop-overlay-title {
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .drop-overlay-path {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 80px 20px; color: var(--text2); }
  .empty h2 { font-size: 20px; margin-bottom: 8px; color: var(--text); }
  .loading { text-align: center; padding: 80px 20px; color: var(--text2); }
  .loading .spinner { width: 28px; height: 28px; border-width: 3px; }

  /* Card entrance animation */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card { animation: cardIn 0.3s ease-out both; }

  .crawl-bar { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 24px; font-size: 12px; color: var(--text2); align-items: center; gap: 12px; }
  .crawl-bar.active { display: flex; }
  .crawl-progress { flex: 1; max-width: 300px; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .crawl-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .crawl-active { color: var(--accent); font-weight: 500; }

  @media (max-width: 900px) {
    body.aspect-square { --tile-min: 220px; }
    body.aspect-wide { --tile-min: 260px; }
    .grid { padding: 18px; gap: 14px; }
    .detail { padding: 18px; }
    .detail-header { flex-direction: column; }
    .detail-controls { width: 100%; }
    .detail-screenshot { width: 100%; aspect-ratio: 1 / 1; min-height: 0; }
    .detail-screenshot img { width: 100%; height: 100%; object-fit: contain; }
  }

  @media (max-width: 720px) {
    body.aspect-square { --tile-min: 168px; }
    body.aspect-wide { --tile-min: 220px; }
    .topbar {
      gap: 10px;
      padding: 12px;
      flex-wrap: wrap;
      align-items: stretch;
    }
    .breadcrumb {
      flex: 1 1 100%;
      min-width: 0;
    }
    .breadcrumb a,
    .breadcrumb .current {
      font-size: 16px;
    }
    .filters {
      order: 2;
      flex: 1 1 100%;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 2px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filters::-webkit-scrollbar { display: none; }
    .search {
      order: 3;
      flex: 1 1 0;
      max-width: none;
    }
    .topbar-right {
      order: 4;
      margin-left: 0;
    }

    }

    }

</style>
</head>
<body>

<div class="topbar">
  <div class="breadcrumb" id="breadcrumb">
    <span class="current">Directory/</span>
  </div>
  <div class="filters" id="filters">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All</button>
    <button class="filter-chip" data-filter="folders" onclick="setFilter('folders', this)">Folders</button>
    <button class="filter-chip" data-filter="groups" onclick="setFilter('groups', this)">Groups</button>
    <button class="filter-chip" data-filter="node" onclick="setFilter('node', this)">Node</button>
    <button class="filter-chip" data-filter="html" onclick="setFilter('html', this)">HTML</button>
    <button class="filter-chip" data-filter="python" onclick="setFilter('python', this)">Python</button>
    <button class="filter-chip" data-filter="utility" onclick="setFilter('utility', this)">Utility</button>
  </div>
  <input class="search" id="search" type="text" placeholder="Search projects..." oninput="filterProjects()">
  <div class="topbar-right">
    <button class="sort-btn" id="aspectBtn" onclick="toggleAspect()" title="Toggle card aspect ratio">1:1</button>
    <button class="sort-btn" id="sortBtn" onclick="cycleSort()" title="Change sort">↓</button>
    <button class="stop-all-btn" id="stopAllBtn" onclick="stopAll()" title="Stop all">&#9632;</button>
  </div>
</div>

<div class="crawl-bar" id="crawlBar">
  <span class="spinner"></span>
  <span id="crawlText">Capturing screenshots...</span>
  <div class="crawl-progress"><div class="crawl-progress-fill" id="crawlFill" style="width:0%"></div></div>
  <span class="crawl-active" id="crawlActive"></span>
</div>

<div class="drop-overlay" id="dropOverlay">
  <div class="drop-overlay-card">
    <div class="drop-overlay-title">Drop Folder</div>
    <div class="drop-overlay-path" id="dropOverlayPath">Add from Code/</div>
  </div>
</div>

<div class="grid" id="grid"><div class="loading"><span class="spinner"></span></div></div>
<div class="detail" id="detail"></div>
<div class="modal-overlay" id="modal" onclick="closeModal()"><img id="modalImg" src=""></div>

<script>
let projects = [];
let currentFilter = 'all';
let currentSort = 'recent_desc'; // 'recent_desc', 'recent_asc', 'alpha'
let currentProject = null;
let currentCollection = null; // When viewing inside a collection
let dragState = null;
let activeDropCard = null;
let suppressClicksUntil = 0;
let editingGroupKey = null;
let editingGroupDraft = '';
let statuses = {};
let navStack = []; // ['grid'] or ['grid', 'World Code'] or ['grid', 'World Code', 'festival globe']
let rootDirectoryName = 'Directory';
let externalDropDepth = 0;
let projectsLoadPromise = null;
let currentAspect = (() => {
  try {
    return localStorage.getItem('projectLauncherAspect') === 'wide' ? 'wide' : 'square';
  } catch {
    return 'square';
  }
})();

// --- SSE ---
const evtSource = new EventSource('/api/status');
evtSource.onmessage = (e) => {
  try { statuses = { ...statuses, ...JSON.parse(e.data) }; updateStatusDots(); } catch {}
};
let statusDetailTimer = null;
evtSource.addEventListener('status', (e) => {
  try {
    const d = JSON.parse(e.data);
    statuses[d.name] = d;
    updateStatusDots();
    if (currentProject && (currentProject.name === d.name || currentProject.fullName === d.name)) {
      currentProject.status = d.status;
      currentProject.port = d.port || currentProject.port;
      // Debounce detail re-render — stop sends multiple events
      clearTimeout(statusDetailTimer);
      statusDetailTimer = setTimeout(() => renderDetail(), 300);
    }
  } catch {}
});
let screenshotRefreshTimer = null;
evtSource.addEventListener('screenshot', (e) => {
  try {
    const d = JSON.parse(e.data);
    if (currentProject && (currentProject.name === d.name || currentProject.fullName === d.name)) {
      const apiName = currentProject.fullName || currentProject.name;
      fetch(`/api/projects/${encodeURIComponent(apiName)}`).then(r => r.json()).then(p => { currentProject = p; renderDetail(); });
    }
    // Debounce grid refresh — batch rapid screenshot events
    clearTimeout(screenshotRefreshTimer);
    screenshotRefreshTimer = setTimeout(() => loadProjects(), 2000);
  } catch {}
});
evtSource.addEventListener('crawl', (e) => {
  try {
    const d = JSON.parse(e.data);
    const bar = document.getElementById('crawlBar');
    if (d.running) {
      bar.classList.add('active');
      const pct = d.total > 0 ? Math.round(((d.done + d.failed) / d.total) * 100) : 0;
      document.getElementById('crawlFill').style.width = pct + '%';
      document.getElementById('crawlText').textContent = `Capturing screenshots... ${d.done + d.failed}/${d.total}`;
      document.getElementById('crawlActive').textContent = d.active.length > 0 ? d.active.join(', ') : '';
    } else {
      bar.classList.remove('active');
    }
  } catch {}
});

// --- Data ---
async function loadProjects(force = false) {
  if (projectsLoadPromise && !force) return projectsLoadPromise;

  projectsLoadPromise = (async () => {
    if (force) await fetch('/api/projects/refresh', { method: 'POST' });
    const res = await fetch('/api/projects', { cache: 'no-store' });
    projects = await res.json();
    if (currentCollection) {
      renderCollectionGrid();
    } else if (!currentProject) {
      renderGrid();
    }
    return projects;
  })();

  try {
    return await projectsLoadPromise;
  } finally {
    projectsLoadPromise = null;
  }
}
async function loadMeta() {
  try {
    const res = await fetch('/api/meta');
    const meta = await res.json();
    rootDirectoryName = meta.rootName || 'Directory';
  } catch {}
  document.title = `${rootDirectoryName}/`;
  renderBreadcrumb();
}

function scheduleBootstrapReloads() {
  const ensureProjectsLoaded = () => {
    if (projects.length === 0 && !currentProject) {
      loadProjects().catch(() => {});
    }
  };
  const retryDelays = [1200, 3200, 6200];
  retryDelays.forEach(delay => {
    setTimeout(ensureProjectsLoaded, delay);
  });
  window.addEventListener('load', ensureProjectsLoaded, { once: true });
  window.addEventListener('pageshow', ensureProjectsLoaded, { once: true });
}

// --- Navigation ---
function navigate(view, data) {
  const grid = document.getElementById('grid');
  const detail = document.getElementById('detail');
  const search = document.getElementById('search');
  const filters = document.getElementById('filters');

  if (view === 'grid') {
    navStack = ['grid'];
    currentProject = null;
    currentCollection = null;
    grid.style.display = 'grid';
    detail.style.display = 'none';
    search.style.display = 'block';
    filters.style.display = 'flex';
    renderBreadcrumb();
    renderGrid();
  } else if (view === 'collection') {
    navStack = ['grid', getCollectionKey(data)];
    currentProject = null;
    currentCollection = data;
    grid.style.display = 'grid';
    detail.style.display = 'none';
    search.style.display = 'block';
    filters.style.display = 'flex';
    renderBreadcrumb();
    renderCollectionGrid();
  } else if (view === 'detail') {
    navStack.push(data.name || data.fullName);
    currentProject = data;
    grid.style.display = 'none';
    detail.style.display = 'block';
    search.style.display = 'none';
    filters.style.display = 'none';
    renderBreadcrumb();
    renderDetail();
  }
}

function goBack() {
  if (navStack.length <= 1) return;
  navStack.pop();
  if (navStack.length === 1) {
    navigate('grid');
  } else {
    // Back to collection
    const collKey = navStack[1];
    const coll = findCollectionByKey(collKey);
    if (coll) {
      navStack = ['grid'];
      navigate('collection', coll);
    } else {
      navigate('grid');
    }
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const rootLabel = `${rootDirectoryName}/`;
  if (navStack.length <= 1) {
    bc.innerHTML = `<span class="current">${escHtml(rootLabel)}</span>`;
  } else {
    let html = `<a onclick="navigate('grid')">${escHtml(rootLabel)}</a>`;
    if (currentCollection) {
      const collectionLabel = getCollectionLabel(currentCollection);
      if (currentProject && currentCollection.synthetic) {
        html += `<span class="current-wrap">${renderGroupNameEditor(currentCollection, 'header-link')}</span>`;
      } else if (currentProject) {
        html += `<a onclick="goBack()">${escHtml(collectionLabel)}</a>`;
      } else if (currentCollection.synthetic) {
        html += `<span class="current-wrap">${renderGroupNameEditor(currentCollection, 'header')}</span>`;
      } else {
        html += `<span class="current">${escHtml(collectionLabel)}</span>`;
      }
    }
    if (currentProject) {
      if (currentCollection) html += '<span class="sep">/</span>';
      html += `<span class="current">${escHtml(formatProjectLabel(currentProject.name))}</span>`;
    }
    bc.innerHTML = html;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal').classList.contains('active')) closeModal();
    else goBack();
  }
});

document.addEventListener('click', e => {
  if (Date.now() < suppressClicksUntil) {
    e.preventDefault();
    e.stopPropagation();
  }
}, true);

// --- Filters ---
function setActiveFilterChip(filter) {
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === filter);
  });
}

function setFilter(filter, btn) {
  currentFilter = filter;
  if (btn) btn.blur();
  setActiveFilterChip(filter);
  navigate('grid');
}
function filterProjects() {
  if (currentCollection) renderCollectionGrid();
  else renderGrid();
}
function getSearchQuery() {
  return document.getElementById('search').value.trim().toLowerCase();
}

function pathBasename(pathValue) {
  if (!pathValue) return '';
  const normalized = String(pathValue).replace(/\/+$/, '');
  const parts = normalized.split('/');
  return parts[parts.length - 1] || '';
}

function getDropOverlay() {
  return document.getElementById('dropOverlay');
}

function setExternalDropActive(active, folderName = '') {
  const overlay = getDropOverlay();
  if (!overlay) return;
  const label = folderName ? `${rootDirectoryName}/${folderName}` : `Add from ${rootDirectoryName}/`;
  document.getElementById('dropOverlayPath').textContent = label;
  overlay.classList.toggle('active', active);
}

function isExternalFileDrag(event) {
  const types = Array.from(event.dataTransfer?.types || []);
  return types.includes('Files');
}

function parseDroppedFileUriList(data) {
  if (!data) return [];
  return data
    .split('\n')
    .map(line => line.trim())
    .filter(line => line && !line.startsWith('#'))
    .map(line => {
      try {
        const url = new URL(line);
        if (url.protocol !== 'file:') return '';
        return decodeURIComponent(url.pathname);
      } catch {
        return '';
      }
    })
    .filter(Boolean);
}

function getDroppedFolderPayload(event) {
  const items = Array.from(event.dataTransfer?.items || []);
  const entry = items
    .map(item => {
      try {
        return typeof item.webkitGetAsEntry === 'function' ? item.webkitGetAsEntry() : null;
      } catch {
        return null;
      }
    })
    .find(candidate => candidate?.isDirectory);

  const filePaths = parseDroppedFileUriList(event.dataTransfer?.getData?.('text/uri-list') || '');
  const files = Array.from(event.dataTransfer?.files || []);
  const directPathFile = files.find(file => typeof file.path === 'string' && file.path);
  let folderPath = filePaths[0] || directPathFile?.path || '';
  const folderName = entry?.name || pathBasename(folderPath);
  if (entry?.isDirectory && folderPath && pathBasename(folderPath) !== entry.name) {
    folderPath = '';
  }

  return { folderName, folderPath };
}

async function handleExternalFolderDrop(event) {
  const payload = getDroppedFolderPayload(event);
  if (!payload.folderName && !payload.folderPath) {
    throw new Error(`Drop a folder from ${rootDirectoryName}/`);
  }

  const res = await fetch('/api/projects/drop-folder', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) {
    throw new Error(data.error || `Drop a folder from ${rootDirectoryName}/`);
  }

  document.getElementById('search').value = '';
  const nextFilter = data.item?.type === 'collection' ? 'folders' : 'all';
  currentFilter = nextFilter;
  setActiveFilterChip(nextFilter);
  navigate('grid');
  await loadProjects();
}

function bindExternalFolderDrop() {
  window.addEventListener('dragenter', event => {
    if (!isExternalFileDrag(event)) return;
    externalDropDepth += 1;
    const payload = getDroppedFolderPayload(event);
    setExternalDropActive(true, payload.folderName);
  });

  window.addEventListener('dragover', event => {
    if (!isExternalFileDrag(event)) return;
    event.preventDefault();
    const payload = getDroppedFolderPayload(event);
    setExternalDropActive(true, payload.folderName);
  });

  window.addEventListener('dragleave', event => {
    if (!isExternalFileDrag(event)) return;
    externalDropDepth = Math.max(0, externalDropDepth - 1);
    if (externalDropDepth === 0) setExternalDropActive(false);
  });

  window.addEventListener('drop', async event => {
    if (!isExternalFileDrag(event)) return;
    event.preventDefault();
    externalDropDepth = 0;
    setExternalDropActive(false);
    try {
      await handleExternalFolderDrop(event);
    } catch (err) {
      alert(err.message);
    }
  });
}

function matchesSearch(item, query = getSearchQuery()) {
  if (!query) return true;
  return item.name.toLowerCase().includes(query) || (item.framework || '').toLowerCase().includes(query);
}
function matchesProjectFilter(item, options = {}) {
  const query = options.query ?? getSearchQuery();
  const includeCollections = options.includeCollections === true;
  if (item.type === 'collection') {
    if (!includeCollections) return false;
    if (currentFilter === 'utility') return false;
    return item.category !== 'utility' && matchesSearch(item, query);
  }
  if (currentFilter === 'utility') {
    return item.category === 'utility' && matchesSearch(item, query);
  }
  if (currentFilter === 'all' || currentFilter === 'folders' || currentFilter === 'groups') {
    return item.category !== 'utility' && matchesSearch(item, query);
  }
  return item.category !== 'utility'
    && (item.type === currentFilter || (currentFilter === 'node' && item.framework === 'vite'))
    && matchesSearch(item, query);
}
function applyFilter(list, options = {}) {
  const query = options.query ?? getSearchQuery();
  return list.filter(item => matchesProjectFilter(item, { ...options, query }));
}
function getVisibleCollections(collections) {
  const query = getSearchQuery();
  return sortProjects(collections.map(collection => {
    const filteredChildren = sortProjects(applyFilter(collection.children || [], { query }));
    const nameMatch = matchesSearch(collection, query);
    if (!nameMatch && filteredChildren.length === 0) return null;
    const displayChildren = filteredChildren.length > 0 || !query ? filteredChildren : (collection.children || []);
    return {
      ...collection,
      children: displayChildren,
      childCount: displayChildren.length || collection.childCount || 0,
      launchableChildren: displayChildren.filter(child => child.launchable).length,
    };
  }).filter(Boolean));
}
function formatProjectLabel(name) {
  return String(name || '').replace(/[-_]/g, ' ');
}
function getProjectKey(project) {
  return project?.fullName || project?.name || '';
}
function getCollectionKey(collection) {
  if (!collection) return '';
  return collection.synthetic ? (collection.targetName || collection.name) : collection.name;
}
function getCollectionLabel(collection) {
  if (!collection) return '';
  if (collection.synthetic && collection.name === (collection.targetName || collection.name)) {
    return formatProjectLabel(collection.name);
  }
  return collection.name;
}
function findCollectionByKey(key) {
  return projects.find(project =>
    project.type === 'collection'
    && (project.synthetic ? (project.targetName || project.name) : project.name) === key
  ) || null;
}
function renderCurrentView() {
  renderBreadcrumb();
  if (currentProject) return;
  if (currentCollection) renderCollectionGrid();
  else renderGrid();
  focusGroupEditor();
}
function startGroupEdit(targetName) {
  const group = findCollectionByKey(targetName);
  if (!group) return;
  editingGroupKey = targetName;
  editingGroupDraft = group.name;
  renderCurrentView();
}
function updateGroupEditValue(value) {
  editingGroupDraft = value;
}
function cancelGroupEdit() {
  editingGroupKey = null;
  editingGroupDraft = '';
  renderCurrentView();
}
function focusGroupEditor() {
  if (!editingGroupKey) return;
  requestAnimationFrame(() => {
    const input = [...document.querySelectorAll('[data-group-input-key]')]
      .find(el => el.dataset.groupInputKey === editingGroupKey);
    if (input) {
      input.focus();
      input.select();
    }
  });
}
async function saveGroupEdit(targetName) {
  const group = findCollectionByKey(targetName);
  if (!group) {
    cancelGroupEdit();
    return;
  }
  const trimmed = editingGroupDraft.trim();
  if (!trimmed) {
    cancelGroupEdit();
    return;
  }
  if (trimmed === group.name) {
    cancelGroupEdit();
    return;
  }

  const previousKey = editingGroupKey;
  const previousDraft = editingGroupDraft;
  editingGroupKey = null;
  editingGroupDraft = '';

  try {
    await renameGroup(targetName, trimmed);
  } catch (err) {
    editingGroupKey = previousKey;
    editingGroupDraft = previousDraft;
    renderCurrentView();
    alert(err.message);
  }
}
function handleGroupEditKeydown(event, targetName) {
  event.stopPropagation();
  if (event.key === 'Enter') {
    event.preventDefault();
    saveGroupEdit(targetName);
  } else if (event.key === 'Escape') {
    event.preventDefault();
    cancelGroupEdit();
  }
}
function renderGroupNameEditor(collection, context = 'card') {
  const groupKey = getCollectionKey(collection);
  const isEditing = editingGroupKey === groupKey;
  const displayName = getCollectionLabel(collection);

  if (!isEditing) {
    if (context === 'header-link') {
      return `<a title="Click to go back. Double-click to rename." onclick="goBack()" ondblclick="event.preventDefault(); event.stopPropagation(); startGroupEdit('${escJs(groupKey)}')">${escHtml(displayName)}</a>`;
    }
    const labelClass = context === 'header' ? 'current' : 'card-name';
    return `<span class="${labelClass} group-name-trigger" title="Click to rename group" onclick="event.stopPropagation(); startGroupEdit('${escJs(groupKey)}')">${escHtml(displayName)}</span>`;
  }

  return `<span class="inline-edit" onclick="event.stopPropagation()">
    <input
      class="inline-edit-input"
      data-group-input-key="${escHtml(groupKey)}"
      value="${escHtml(editingGroupDraft)}"
      onclick="event.stopPropagation()"
      oninput="updateGroupEditValue(this.value)"
      onkeydown="handleGroupEditKeydown(event, '${escJs(groupKey)}')"
    >
    <button class="rename-btn" title="Save group name" onclick="event.stopPropagation(); saveGroupEdit('${escJs(groupKey)}')">save</button>
    <button class="rename-btn" title="Cancel editing" onclick="event.stopPropagation(); cancelGroupEdit()">cancel</button>
  </span>`;
}
function updateSortButton() {
  const btn = document.getElementById('sortBtn');
  if (!btn) return;
  const labels = {
    recent_desc: '&darr;',
    recent_asc: '&uarr;',
    alpha: 'ABC',
  };
  const titles = {
    recent_desc: 'Newest first',
    recent_asc: 'Oldest first',
    alpha: 'Alphabetical',
  };
  btn.innerHTML = labels[currentSort] || '&darr;';
  btn.title = titles[currentSort] || 'Change sort';
}
function updateAspectButton() {
  const btn = document.getElementById('aspectBtn');
  if (!btn) return;
  const iconClass = currentAspect === 'wide' ? 'wide' : 'square';
  btn.innerHTML = `<span class="aspect-icon ${iconClass}" aria-hidden="true"></span>`;
  btn.setAttribute('aria-label', currentAspect === 'wide' ? 'Wide cards' : 'Square cards');
  btn.title = currentAspect === 'wide' ? 'Switch to square cards' : 'Switch to wide cards';
}
function applyAspectMode() {
  document.body.classList.toggle('aspect-square', currentAspect === 'square');
  document.body.classList.toggle('aspect-wide', currentAspect === 'wide');
}
function setAspect(aspect) {
  currentAspect = aspect === 'wide' ? 'wide' : 'square';
  try {
    localStorage.setItem('projectLauncherAspect', currentAspect);
  } catch {}
  applyAspectMode();
  updateAspectButton();
  renderCurrentView();
}
function toggleAspect() {
  setAspect(currentAspect === 'square' ? 'wide' : 'square');
}
function parseCommitDate(dateStr) {
  if (!dateStr) return 0;
  const m = String(dateStr).match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2}):(\d{2}) ([+-])(\d{2})(\d{2})$/);
  if (m) {
    const [, y, mo, d, h, mi, s, sign, tzh, tzm] = m;
    const utcMs = Date.UTC(Number(y), Number(mo) - 1, Number(d), Number(h), Number(mi), Number(s));
    const offsetMinutes = Number(tzh) * 60 + Number(tzm);
    return utcMs - (sign === '+' ? offsetMinutes : -offsetMinutes) * 60 * 1000;
  }
  const ts = Date.parse(dateStr);
  return Number.isFinite(ts) ? ts : 0;
}
function formatCommitStamp(item) {
  const rawTs = item.currentCommit?.timestamp != null
    ? Number(item.currentCommit.timestamp) * 1000
    : getSortTimestamp(item);
  if (!rawTs) return '';

  const d = new Date(rawTs);
  if (Number.isNaN(d.getTime())) return '';

  const now = new Date();
  const weekStart = new Date(now);
  const mondayOffset = (weekStart.getDay() + 6) % 7;
  weekStart.setDate(weekStart.getDate() - mondayOffset);
  weekStart.setHours(0, 0, 0, 0);

  const nextWeek = new Date(weekStart);
  nextWeek.setDate(nextWeek.getDate() + 7);

  const time = new Intl.DateTimeFormat('en-US', {
    hour: 'numeric',
    hour12: true,
  }).format(d).replace(/\s/g, '');

  if (d >= weekStart && d < nextWeek) {
    const weekday = new Intl.DateTimeFormat('en-US', { weekday: 'short' }).format(d);
    return `${weekday} ${time}`;
  }

  const monthDay = new Intl.DateTimeFormat('en-US', {
    month: '2-digit',
    day: '2-digit',
  }).format(d);
  return `${monthDay} ${time}`;
}
function getSortTimestamp(item) {
  if (item.currentCommit?.timestamp != null) return Number(item.currentCommit.timestamp) * 1000;
  if (item.currentCommit?.date) return parseCommitDate(item.currentCommit.date);
  if (item.type === 'collection' && item.children?.length) {
    let best = 0;
    for (const child of item.children) {
      const ts = child.currentCommit?.timestamp != null
        ? Number(child.currentCommit.timestamp) * 1000
        : (child.currentCommit?.date ? parseCommitDate(child.currentCommit.date) : 0);
      if (ts > best) best = ts;
    }
    return best;
  }
  return 0;
}
function sortProjects(list) {
  const copy = [...list];
  if (currentSort === 'alpha') {
    copy.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    // Sort by commit date, newest first or oldest first.
    // Collections use the newest child commit so folders still sort meaningfully.
    copy.sort((a, b) => {
      const da = getSortTimestamp(a);
      const db = getSortTimestamp(b);
      const diff = currentSort === 'recent_desc' ? db - da : da - db;
      return diff || a.name.localeCompare(b.name);
    });
  }
  return copy;
}
function setSort(sort) {
  currentSort = sort;
  updateSortButton();
  if (currentCollection) renderCollectionGrid();
  else renderGrid();
}
function cycleSort() {
  const order = ['recent_desc', 'recent_asc', 'alpha'];
  const idx = order.indexOf(currentSort);
  setSort(order[(idx + 1) % order.length]);
}
async function stopAll() {
  const running = Object.entries(statuses).filter(([, s]) => s.status === 'running');
  if (running.length === 0) return;
  document.getElementById('stopAllBtn').innerHTML = '...';
  for (const [name] of running) {
    await fetch(`/api/projects/${encodeURIComponent(name)}/stop`, { method: 'POST' });
  }
  document.getElementById('stopAllBtn').innerHTML = '&#9632;';
}

function clearDropTargets() {
  document.querySelectorAll('.card.drop-active').forEach(card => card.classList.remove('drop-active'));
}

function setActiveDropCard(card) {
  if (activeDropCard === card) return;
  if (activeDropCard) activeDropCard.classList.remove('drop-active');
  activeDropCard = card || null;
  if (activeDropCard) activeDropCard.classList.add('drop-active');
}

function clearDragState() {
  if (dragState?.card) {
    dragState.card.classList.remove('dragging');
    if (typeof dragState.card.releasePointerCapture === 'function' && dragState.pointerId != null) {
      try { dragState.card.releasePointerCapture(dragState.pointerId); } catch {}
    }
  }
  dragState = null;
  setActiveDropCard(null);
  document.body.classList.remove('dragging-project');
}

function handleCardPointerDown(event) {
  if (event.button !== 0) return;
  if (event.target?.closest?.('.card-info, .group-dissolve-btn, .inline-edit, button, input, a')) return;
  const card = event.currentTarget;
  const name = card.dataset.name || '';
  if (!name) return;
  dragState = {
    pointerId: event.pointerId,
    name,
    card,
    lastTargetCard: card,
    startX: event.clientX,
    startY: event.clientY,
    dragging: false,
  };
}

function handleGlobalPointerMove(event) {
  if (!dragState) return;
  if (dragState.pointerId != null && event.pointerId != null && dragState.pointerId !== event.pointerId) return;
  const dx = event.clientX - dragState.startX;
  const dy = event.clientY - dragState.startY;

  if (!dragState.dragging) {
    if (Math.hypot(dx, dy) < 8) return;
    dragState.dragging = true;
    if (typeof dragState.card.setPointerCapture === 'function' && dragState.pointerId != null) {
      try { dragState.card.setPointerCapture(dragState.pointerId); } catch {}
    }
    dragState.card.classList.add('dragging');
    document.body.classList.add('dragging-project');
  }

  const target = document.elementFromPoint(event.clientX, event.clientY)?.closest('.card[data-drop-type]');
  if (!target) {
    setActiveDropCard(null);
    return;
  }

  const targetName = target.dataset.dropName;
  const targetType = target.dataset.dropType;
  if (!targetName || !targetType || targetName === dragState.name) {
    setActiveDropCard(null);
    return;
  }

  setActiveDropCard(target);
}

async function handleGlobalPointerUp(event) {
  if (!dragState) return;
  if (dragState.pointerId != null && event?.pointerId != null && dragState.pointerId !== event.pointerId) return;
  const state = dragState;
  const dropCard = activeDropCard;
  const wasDragging = state.dragging;
  clearDragState();

  if (!wasDragging) return;
  suppressClicksUntil = Date.now() + 250;

  const targetName = dropCard?.dataset.dropName;
  const targetType = dropCard?.dataset.dropType;
  if (!targetName || !targetType || targetName === state.name) return;

  try {
    await groupProjectIntoTarget(state.name, targetName, targetType);
  } catch (err) {
    alert(err.message);
  }
}

window.addEventListener('pointermove', handleGlobalPointerMove);
window.addEventListener('pointerup', handleGlobalPointerUp);
window.addEventListener('pointercancel', clearDragState);
window.addEventListener('blur', clearDragState);

function handleCardPointerLeave(event) {
  if (!dragState?.dragging) return;
  const target = event.relatedTarget?.closest?.('.card[data-drop-type]');
  if (!target || target !== activeDropCard) {
    setActiveDropCard(null);
  }
}

function cancelDrag() {
  clearDragState();
  clearDropTargets();
}

async function groupProjectIntoTarget(sourceName, targetName, targetType) {
  const res = await fetch('/api/groups/group', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sourceName, targetName, targetType }),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.error || 'Failed to update group');
  await loadProjects(true);
}

async function renameGroup(targetName, nextName) {
  const res = await fetch(`/api/groups/${encodeURIComponent(targetName)}/rename`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: nextName }),
  });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.error || 'Failed to rename group');
  await loadProjects(true);

  if (currentCollection?.synthetic && currentCollection.targetName === targetName) {
    const fresh = findCollectionByKey(targetName);
    if (fresh) {
      currentCollection = fresh;
      navStack = ['grid', getCollectionKey(fresh)];
      renderCurrentView();
    } else {
      navigate('grid');
    }
  }
}

async function dissolveGroup(targetName) {
  const group = findCollectionByKey(targetName);
  if (!group) return;
  if (!window.confirm(`Dissolve group "${group.name}"?`)) return;

  const res = await fetch(`/api/groups/${encodeURIComponent(targetName)}/dissolve`, {
    method: 'POST',
  });
  const data = await res.json();
  if (!res.ok || !data.ok) throw new Error(data.error || 'Failed to dissolve group');

  if (editingGroupKey === targetName) {
    editingGroupKey = null;
    editingGroupDraft = '';
  }

  await loadProjects(true);

  if (currentCollection?.synthetic && currentCollection.targetName === targetName) {
    navigate('grid');
  }
}

async function handleCardDrop(event) {
  return handleGlobalPointerUp(event);
}

let suppressProjectCardClickUntil = 0;

function suppressProjectCardClick() {
  suppressProjectCardClickUntil = Date.now() + 250;
}

function handleProjectCardClick(name) {
  if (Date.now() < suppressProjectCardClickUntil) return;
  showDetail(name);
}

function handleProjectThumbClick(name, launchable) {
  suppressProjectCardClick();
  if (launchable) launchOrOpen(name);
  else showDetail(name);
}

function handleProjectInfoClick(name) {
  showDetail(name);
}

function handleProjectInfoTap(event, name) {
  if (event) event.stopPropagation();
  handleProjectInfoClick(name);
}

function handleProjectStatusClick(name) {
  suppressProjectCardClick();
  stopFromCard(name);
}

function withAnimationDelay(cardHtml, delay) {
  return cardHtml.replace(/<div class="([^"]*card[^"]*)"/, `<div class="$1" style="animation-delay:${delay}ms"`);
}

function getScreenshotThumbUrl(projectName, screenshot, aspect = currentAspect) {
  if (!projectName || !screenshot) return '';
  const filename = aspect === 'wide'
    ? (screenshot.wideThumb || screenshot.thumb)
    : screenshot.thumb;
  if (!filename) return '';
  return `/screenshots/${encodeURIComponent(projectName)}/${filename}`;
}

// --- Render cards ---
function renderCard(p, onclick, options = {}) {
  const s = statuses[p.fullName || p.name] || p;
  const status = s.status || 'stopped';
  const screenshotName = p.fullName || p.name;
  const thumbUrl = getScreenshotThumbUrl(screenshotName, p.latestScreenshot);
  const icons = { node: '⬡', html: '◇', python: '⬡', swift: '◇', collection: '⬡', electron: '◇', unknown: '○' };
  const badgeType = p.framework === 'electron-html' ? 'electron' : p.type;
  const dragAttrs = options.draggable
    ? ' onpointerdown="handleCardPointerDown(event)"'
    : '';
  const dropAttrs = options.dropType
    ? ` data-drop-type="${escHtml(options.dropType)}" data-drop-name="${escHtml(options.dropName || (p.type === 'collection' && p.synthetic ? getCollectionKey(p) : getProjectKey(p)))}" onmouseleave="handleCardPointerLeave(event)"`
    : '';
  const cardClasses = ['card'];
  if (options.draggable) cardClasses.push('draggable');
  if (p.synthetic) cardClasses.push('synthetic-group');
  const clickAttr = onclick ? ` onclick="${onclick}"` : '';

  if (p.type === 'collection') {
    // Collection card: real folders use a mini-grid, groups use the latest child's single thumbnail
    const children = p.children || [];
    let thumbHtml = `<span class="placeholder">▣</span>`;
    if (p.synthetic) {
      const latestChild = [...children]
        .filter(child => child.latestScreenshot)
        .sort((a, b) => getSortTimestamp(b) - getSortTimestamp(a))[0];
      if (latestChild?.latestScreenshot) {
        const cName = latestChild.fullName || latestChild.name;
        thumbHtml = `<img src="${getScreenshotThumbUrl(cName, latestChild.latestScreenshot)}" draggable="false">`;
      }
    } else {
      const thumbChildren = [...children]
        .filter(c => c.latestScreenshot)
        .sort((a, b) => getSortTimestamp(b) - getSortTimestamp(a))
        .slice(0, 4);
      if (thumbChildren.length > 0) {
        thumbHtml = `<div class="mini-grid">${thumbChildren.map(c => {
          const cName = c.fullName || c.name;
          return `<img src="${getScreenshotThumbUrl(cName, c.latestScreenshot, 'square')}" draggable="false">`;
        }).join('')}${Array(Math.max(0, 4 - thumbChildren.length)).fill('<div class="mini-placeholder"></div>').join('')}</div>`;
      }
    }

    const infoHtml = `
      <div class="card-info">
        <div class="card-main">
          ${p.synthetic ? renderGroupNameEditor(p, 'card') : `<div class="card-name">${escHtml(formatProjectLabel(p.name))}</div>`}
          <div class="card-subtitle">${p.synthetic ? `${p.childCount} projects` : `${p.childCount} items`}</div>
        </div>
      </div>`;

    if (currentAspect === 'wide') {
      return `
        <div class="${cardClasses.join(' ')}"${clickAttr}${dropAttrs}>
          ${p.synthetic ? `<button class="group-dissolve-btn" title="Dissolve group" onclick="event.stopPropagation(); dissolveGroup('${escJs(getCollectionKey(p))}').catch(err => alert(err.message))">x</button>` : ''}
          <div class="card-thumb">
            ${thumbHtml}
          </div>
          ${infoHtml}
        </div>`;
    }

    return `
      <div class="${cardClasses.join(' ')}"${clickAttr}${dropAttrs}>
        ${p.synthetic ? `<button class="group-dissolve-btn" title="Dissolve group" onclick="event.stopPropagation(); dissolveGroup('${escJs(getCollectionKey(p))}').catch(err => alert(err.message))">x</button>` : ''}
        <div class="card-thumb">
          ${thumbHtml}
          ${infoHtml}
        </div>
      </div>`;
  }

  const apiName = (p.fullName || p.name).replace(/'/g, "\\'");
  const isRunning = status === 'running';
  const commitStamp = formatCommitStamp(p);
  const infoHtml = `
    <div class="card-info" onclick="handleProjectInfoTap(event, '${apiName}')">
      <div class="card-main">
        <div class="card-name">${escHtml(formatProjectLabel(p.name))}</div>
      </div>
      ${p.isGit ? `<div class="card-meta">${commitStamp ? `<div class="card-commit">${escHtml(commitStamp)}</div>` : ''}<div class="card-plus">+</div></div>` : ''}
    </div>`;

  if (currentAspect === 'wide') {
    return `
      <div class="${cardClasses.join(' ')}" data-name="${escHtml(apiName)}"${dragAttrs}${dropAttrs}>
        <div class="card-thumb" onclick="handleProjectThumbClick('${apiName}', ${p.launchable ? 'true' : 'false'})">
          ${thumbUrl ? `<img src="${thumbUrl}" alt="${escHtml(p.name)}" draggable="false">` : `<span class="placeholder">${icons[p.type] || '○'}</span>`}
          <div class="status-dot card-status ${status}" ${isRunning ? `onclick="event.stopPropagation(); handleProjectStatusClick('${apiName}')" title="Click to stop"` : ''}></div>
        </div>
        ${infoHtml}
      </div>`;
  }

  return `
    <div class="${cardClasses.join(' ')}" data-name="${escHtml(apiName)}"${dragAttrs}${dropAttrs}>
      <div class="card-thumb" onclick="handleProjectThumbClick('${apiName}', ${p.launchable ? 'true' : 'false'})">
        ${thumbUrl ? `<img src="${thumbUrl}" alt="${escHtml(p.name)}" draggable="false">` : `<span class="placeholder">${icons[p.type] || '○'}</span>`}
        <div class="status-dot card-status ${status}" ${isRunning ? `onclick="event.stopPropagation(); handleProjectStatusClick('${apiName}')" title="Click to stop"` : ''}></div>
        ${infoHtml}
      </div>
    </div>`;
}

// --- Main grid ---
let initialLoad = true;
function renderGrid() {
  const grid = document.getElementById('grid');
  const topLevelFolders = projects.filter(p => p.type === 'collection' && !p.synthetic);
  const syntheticGroups = projects.filter(p => p.type === 'collection' && p.synthetic);
  const topLevelProjects = projects.filter(p => p.type !== 'collection');
  const folderChildren = topLevelFolders.flatMap(folder => folder.children || []);
  const groupMembers = syntheticGroups.flatMap(group => group.children || []);
  const groupedProjectKeys = new Set(groupMembers.map(getProjectKey));

  if (currentFilter === 'folders') {
    const folders = getVisibleCollections(topLevelFolders);
    const regular = sortProjects(applyFilter(topLevelProjects));

    if (folders.length === 0 && regular.length === 0 && !initialLoad) {
      grid.innerHTML = '<div class="empty"><h2>No projects found</h2></div>';
      return;
    }
    if (folders.length === 0 && regular.length === 0) return; // Still loading

    let html = '';
    let idx = 0;

    if (folders.length > 0) {
      html += '<div class="section-label">Folders</div>';
      html += folders.map(p => {
        const card = renderCard(
          p,
          `navigate('collection', findCollectionByKey('${escJs(getCollectionKey(p))}'))`
        );
        return withAnimationDelay(card, idx++ * 40);
      }).join('');
    }

    if (regular.length > 0) {
      if (folders.length > 0) html += '<div class="section-label">Projects</div>';
      html += regular.map(p => {
        const canGroup = !p.parentName;
        const card = renderCard(p, null, canGroup ? { draggable: true, dropType: 'project' } : {});
        return withAnimationDelay(card, idx++ * 40);
      }).join('');
    }

    grid.innerHTML = html;
    initialLoad = false;
    return;
  }

  if (currentFilter === 'groups') {
    const groups = getVisibleCollections(syntheticGroups);
    const regular = sortProjects(applyFilter([
      ...topLevelProjects,
      ...folderChildren,
    ].filter(project => !groupedProjectKeys.has(getProjectKey(project)))));

    if (groups.length === 0 && regular.length === 0 && !initialLoad) {
      grid.innerHTML = '<div class="empty"><h2>No groups found</h2></div>';
      return;
    }
    if (groups.length === 0 && regular.length === 0) return; // Still loading

    let html = '';
    let idx = 0;

    if (groups.length > 0) {
      html += '<div class="section-label">Groups</div>';
      html += groups.map(group => {
        const card = renderCard(
          group,
          `navigate('collection', findCollectionByKey('${escJs(getCollectionKey(group))}'))`,
          { dropType: 'group', dropName: getCollectionKey(group) }
        );
        return withAnimationDelay(card, idx++ * 40);
      }).join('');
    }

    if (regular.length > 0) {
      html += '<div class="section-label">Projects</div>';
      html += regular.map(project => {
        const card = renderCard(project, null, { draggable: true, dropType: 'project' });
        return withAnimationDelay(card, idx++ * 40);
      }).join('');
    }

    grid.innerHTML = html;
    initialLoad = false;
    return;
  }

  const visibleProjects = sortProjects(applyFilter([
    ...topLevelProjects,
    ...folderChildren,
  ]));

  if (visibleProjects.length === 0 && !initialLoad) {
    grid.innerHTML = '<div class="empty"><h2>No projects found</h2></div>';
    return;
  }
  if (visibleProjects.length === 0) return; // Still loading

  let html = '';
  let idx = 0;
  html += visibleProjects.map(p => {
    const canGroup = !p.parentName;
    const card = renderCard(p, null, canGroup ? { draggable: true, dropType: 'project' } : {});
    return withAnimationDelay(card, idx++ * 40);
  }).join('');

  grid.innerHTML = html;
  initialLoad = false;
}

// --- Collection sub-grid ---
function renderCollectionGrid() {
  const grid = document.getElementById('grid');
  if (!currentCollection?.children) { grid.innerHTML = '<div class="empty"><h2>No sub-projects</h2></div>'; return; }

  // Re-fetch enriched children from the projects array
  const fresh = findCollectionByKey(getCollectionKey(currentCollection));
  if (fresh) currentCollection = fresh;

  const filtered = sortProjects(applyFilter(currentCollection.children || []));
  if (filtered.length === 0) { grid.innerHTML = '<div class="empty"><h2>No matching projects</h2></div>'; return; }

  grid.innerHTML = filtered.map((p, i) => {
    return withAnimationDelay(renderCard(p), i * 40);
  }).join('');
}

let statusDebounce = null;
function updateStatusDots() {
  // Update status dots in-place without re-rendering the grid
  document.querySelectorAll('.card[data-name]').forEach(card => {
    const name = card.dataset.name;
    const s = statuses[name];
    const dot = card.querySelector('.status-dot');
    if (dot) {
      if (s?.status === 'running') {
        dot.classList.add('running');
      } else {
        dot.classList.remove('running');
      }
    }
  });
}

               <button class="btn" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="openProjectUrl(${esc(apiName)})">↗ Open</button>`}
        </div>
        <div class="status-grid">
          <div class="detail-status"><div class="label">Status</div><div class="value" style="color:${isRunning ? 'var(--green)' : 'var(--text2)'}">${status}</div></div>
          <div class="detail-status"><div class="label">Port</div><div class="value">${s.port || p.port || '—'}</div></div>
          <div class="detail-status"><div class="label">Type</div><div class="value">${p.framework || p.type}</div></div>
          <div class="detail-status"><div class="label">Commit</div><div class="value">${p.history?.current?.label || '—'}</div></div>
        </div>
        <div class="console-panel">
          <button class="console-toggle" onclick="toggleConsole()">Console Output ▾</button>
          <div class="console-output" id="consoleOutput"></div>
        </div>
      </div>
    </div>
    ${timeline.length > 0 ? `
    <div class="timeline-section">
      <div class="timeline-title">Version History <span class="count">${tags.length} tags · ${commits.length} commits</span></div>
      <div class="timeline-scroll">
        ${timeline.map(v => {
          const tUrl = v.screenshot ? `/screenshots/${encodeURIComponent(apiName)}/${v.screenshot.thumb}` : '';
          return `<div class="timeline-item ${v.isCurrent ? 'current' : ''} ${v.isTag ? 'tag' : ''}" ${v.screenshot ? `onclick="openModal('/screenshots/${encodeURIComponent(apiName)}/${v.screenshot.full}')"` : ''} title="${escHtml(v.message || v.label)}">
            <div class="timeline-thumb">${tUrl ? `<img src="${tUrl}">` : '<div class="no-capture">No screenshot</div>'}</div>
            <div class="timeline-info"><div class="timeline-label">${v.isTag ? '🏷 ' : ''}${escHtml(v.label)}</div><div class="timeline-date">${v.date ? new Date(v.date).toLocaleDateString() : ''}</div>${v.message ? `<div class="timeline-msg">${escHtml(v.message)}</div>` : ''}</div>

async function toggleImagePicker(apiName) {
  const picker = document.getElementById('imagePicker');
  if (picker.style.display !== 'none') { picker.style.display = 'none'; return; }
  picker.innerHTML = '<div style="padding:20px;color:var(--text2)">Loading images...</div>';
  picker.style.display = 'block';
  try {
    const res = await fetch(`/api/projects/${apiName}/candidates`);
    const candidates = await res.json();
    if (candidates.length === 0) {
      picker.innerHTML = '<div style="padding:20px;color:var(--text2)">No images found in project directory</div>';
      return;
    }
    picker.innerHTML = candidates.map(c => `
      <div class="candidate-img" onclick="setProjectImage('${apiName}', '${c.relPath.replace(/'/g, "\\'")}')">
        <img src="/api/projects/${apiName}/candidates/${encodeURIComponent(c.relPath)}" loading="lazy">
        <div class="candidate-name">${c.relPath}</div>
      </div>
    `).join('');
  } catch (err) {
    picker.innerHTML = `<div style="padding:20px;color:#e55">${err.message}</div>`;
  }
}

async function setProjectImage(apiName, relPath) {
  const res = await fetch(`/api/projects/${apiName}/set-image`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ relPath })
  });
  if (res.ok) {
    document.getElementById('imagePicker').style.display = 'none';
    navigate('detail', currentProject);
  }
}

// --- Card actions ---
function findProjectByName(name) {
  if (currentProject && (currentProject.fullName || currentProject.name) === name) return currentProject;
  const direct = projects.find(p => (p.fullName || p.name) === name || p.name === name);
  if (direct) return direct;
  for (const project of projects) {
    if (!project.children) continue;
    const child = project.children.find(c => (c.fullName || c.name) === name || c.name === name);
    if (child) return child;
  }
  return null;
}

function getProjectUrl(name, explicitPort = null) {
  const project = findProjectByName(name);
  const status = statuses[name] || (project ? statuses[project.fullName || project.name] : null);
  const protocol = status?.protocol || project?.protocol || 'http';
  const port = explicitPort || status?.port || project?.port;
  return port ? `${protocol}://localhost:${port}` : null;
}

function openProjectUrl(name, explicitPort = null) {
  const url = getProjectUrl(name, explicitPort);
  if (url) window.open(url, '_blank');
}

async function launchOrOpen(name) {
  const s = statuses[name];
  if (s && s.status === 'running' && s.port) {
    openProjectUrl(name);
    return;
  }
  window.open(`/launch/${encodeURIComponent(name)}`, '_blank');
}
async function stopFromCard(name) {
  await fetch(`/api/projects/${encodeURIComponent(name)}/stop`, { method: 'POST' });
  // SSE status events handle the dot update — no grid rebuild needed
}

// --- Actions ---
async function startProj(name) {
  event.target.disabled = true;
  event.target.innerHTML = '<span class="spinner"></span> Starting...';
  const res = await fetch(`/api/projects/${encodeURIComponent(name)}/start`, { method: 'POST' });
  const data = await res.json();
  if (!data.ok) { alert(data.error || 'Failed to start'); }
  else if (data.port) { openProjectUrl(name, data.port); }
  const r = await fetch(`/api/projects/${encodeURIComponent(name)}`);
  currentProject = await r.json();
  renderDetail();
}
async function stopProj(name) {
  event.target.disabled = true;
  event.target.textContent = 'Stopping...';
  await fetch(`/api/projects/${encodeURIComponent(name)}/stop`, { method: 'POST' });
  const r = await fetch(`/api/projects/${encodeURIComponent(name)}`);
  currentProject = await r.json();
  renderDetail();
}
async function takeScreenshot(name) {
  event.target.disabled = true;
  event.target.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(`/api/projects/${encodeURIComponent(name)}/screenshot`, { method: 'POST' });
    const data = await res.json();
    if (!data.ok) alert(data.error || 'Screenshot failed');
  } catch (err) { alert('Screenshot failed: ' + err.message); }
  const r = await fetch(`/api/projects/${encodeURIComponent(name)}`);
  currentProject = await r.json();
  renderDetail();
}

// --- Console ---
let consoleVisible = false, logInterval = null;
function toggleConsole() {
  consoleVisible = !consoleVisible;
  document.getElementById('consoleOutput').style.display = consoleVisible ? 'block' : 'none';
  if (consoleVisible) loadLogs();
}
async function loadLogs() {
  if (!currentProject) return;
  const name = currentProject.fullName || currentProject.name;
  const res = await fetch(`/api/projects/${encodeURIComponent(name)}/logs?count=50`);
  const logs = await res.json();
  const el = document.getElementById('consoleOutput');
  if (!el) return;
  el.innerHTML = logs.map(l => `<div class="${l.stream}">${escHtml(l.line)}</div>`).join('');
  el.scrollTop = el.scrollHeight;
  clearInterval(logInterval);
  if (consoleVisible) logInterval = setInterval(loadLogs, 3000);
}

// --- Modal ---
function openModal(src) { event.stopPropagation(); document.getElementById('modalImg').src = src; document.getElementById('modal').classList.add('active'); }
function closeModal() { document.getElementById('modal').classList.remove('active'); }

// --- Utils ---
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

// --- Init ---
applyAspectMode();
updateAspectButton();
updateSortButton();
navigate('grid');
bindExternalFolderDrop();
loadMeta();
loadProjects().catch(() => {});
scheduleBootstrapReloads();
</script>
